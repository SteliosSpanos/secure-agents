name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Prevent concurrent deployments from clashing
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: "eu-central-1"
  API_ECR_REPOSITORY: "agents-api"
  WORKER_ECR_REPOSITORY: "agents-worker"
  ECS_CLUSTER: "agents-cluster"
  API_SERVICE: "agents-api-service"
  WORKER_SERVICE: "agents-worker-service"

permissions:
  id-token: write
  contents: read

jobs:
  code-quality:
    name: Check Formatting and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Speed up recurring runs

      - name: Install Ruff
        run: pip install ruff

      - name: Check Formatting
        run: ruff format --check .

      - name: Run Linter
        run: ruff check .

  deploy:
    name: Build and Deploy to AWS
    needs: code-quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Note: Update this ARN to match the output from 'terraform/iam_github.tf'
          role-to-assume: arn:aws:iam::487322974754:role/GithubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push API Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$API_ECR_REPOSITORY:$IMAGE_TAG ./agent-api
          docker push $ECR_REGISTRY/$API_ECR_REPOSITORY:$IMAGE_TAG

      - name: Build and Push Worker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$WORKER_ECR_REPOSITORY:$IMAGE_TAG ./agent-worker
          docker push $ECR_REGISTRY/$WORKER_ECR_REPOSITORY:$IMAGE_TAG

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.API_ECR_REPOSITORY }} --query taskDefinition > api-task-def.json
          aws ecs describe-task-definition --task-definition ${{ env.WORKER_ECR_REPOSITORY }} --query taskDefinition > worker-task-def.json

      - name: Fill in the new image ID in the Amazon ECS task definition for API
        id: task-def-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: api-task-def.json
          container-name: fastapi-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.API_ECR_REPOSITORY }}:${{ github.sha }}

      - name: Fill in the new image ID in the Amazon ECS task definition for Worker
        id: task-def-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: worker-task-def.json
          container-name: agent-worker
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.WORKER_ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy Amazon ECS task definition for API
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-api.outputs.task-definition }}
          service: ${{ env.API_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deploy Amazon ECS task definition for Worker
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-worker.outputs.task-definition }}
          service: ${{ env.WORKER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
