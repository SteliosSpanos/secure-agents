name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Prevent concurrent deployments from clashing
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: "eu-central-1"
  API_ECR_REPOSITORY: "agents-api"
  WORKER_ECR_REPOSITORY: "agents-worker"
  ECS_CLUSTER: "agents-cluster"
  API_SERVICE: "agents-api-service"
  WORKER_SERVICE: "agents-worker-service"

permissions:
  id-token: write
  contents: read

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Ruff Linter
        uses: astral-sh/ruff-action@v3
        with:
          args: "check ."

      - name: Run Ruff Formatter
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ."

  deploy:
    name: Build and Deploy to AWS
    needs: code-quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Store your ARN (e.g. arn:aws:iam::123456789012:role/GithubActionsRole) in GitHub Secrets
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push images to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$API_ECR_REPOSITORY:$TAG ./agent-api
          docker push $REGISTRY/$API_ECR_REPOSITORY:$TAG
          docker build -t $REGISTRY/$WORKER_ECR_REPOSITORY:$TAG ./agent-worker
          docker push $REGISTRY/$WORKER_ECR_REPOSITORY:$TAG

      - name: Download ECS task definitions
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.API_ECR_REPOSITORY }} --query taskDefinition > api-task-def.json
          aws ecs describe-task-definition --task-definition ${{ env.WORKER_ECR_REPOSITORY }} --query taskDefinition > worker-task-def.json

      - name: Render API Task Definition
        id: task-def-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: api-task-def.json
          container-name: fastapi-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.API_ECR_REPOSITORY }}:${{ github.sha }}

      - name: Render Worker Task Definition
        id: task-def-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: worker-task-def.json
          container-name: agent-worker
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.WORKER_ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy API Service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-api.outputs.task-definition }}
          service: ${{ env.API_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deploy Worker Service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-worker.outputs.task-definition }}
          service: ${{ env.WORKER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
