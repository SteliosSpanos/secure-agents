name: SecureAgents CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# --- THE FIX FOR THE WARNING ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          # Install dependencies so mypy can check types against them
          pip install -r agent-api/requirements.txt
          pip install -r agent-worker/requirements.txt

      - name: Python Quality Checks
        run: |
          # Use 'check' to find errors. Use 'format --check' if you want to enforce style.
          ruff check .
          mypy agent-api --ignore-missing-imports
          mypy agent-worker --ignore-missing-imports

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Check
        run: |
          cd terraform
          terraform init -backend=false
          terraform fmt -check
          terraform validate

  build-and-deploy:
    needs: quality-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA: ${{ github.sha }}
          API_REPO: ${{ vars.API_REPO_NAME || 'agents-api' }}
          WORKER_REPO: ${{ vars.WORKER_REPO_NAME || 'agents-worker' }}
        run: |
          # API Image
          docker build -t $REGISTRY/$API_REPO:$SHA -t $REGISTRY/$API_REPO:latest ./agent-api
          # Worker Image
          docker build -t $REGISTRY/$WORKER_REPO:$SHA -t $REGISTRY/$WORKER_REPO:latest ./agent-worker

          docker push --all-tags $REGISTRY/$API_REPO
          docker push --all-tags $REGISTRY/$WORKER_REPO

      - name: Deploy Infrastructure & Refresh ECS
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

          # Using the --force-new-deployment flag ensures Fargate pulls the 'latest' tag
          # we just pushed, even if the task definition didn't technically change.
          aws ecs update-service --cluster secure-agents-cluster --service secure-agents-api-service --force-new-deployment
          aws ecs update-service --cluster secure-agents-cluster --service secure-agents-worker-service --force-new-deployment
